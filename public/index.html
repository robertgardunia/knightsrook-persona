<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERSONA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e4ed;
    --fg: #e2e4ed;
    --muted: #6b7080;
    --accent: #7c6af7;
    --accent-dim: #4a3fa0;
    --user-bg: #1e2235;
    --persona-bg: #151820;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --blue: #60a5fa;
    --toggle-w: 18px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  header h1 { font-size: 14px; letter-spacing: 0.1em; color: var(--accent); }
  header .persona-selector { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  header label { color: var(--muted); font-size: 11px; }
  header input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 140px;
  }
  header input:focus { outline: none; border-color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Influence chart row ── */
  .chart-row { flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; }
  .chart-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 10px; cursor: pointer; user-select: none;
    font-size: 9px; letter-spacing: 0.1em; color: var(--muted);
    border-bottom: 1px solid transparent;
  }
  .chart-toggle:hover { color: var(--text); }
  .chart-toggle .chevron { font-size: 8px; transition: transform 0.2s; }
  .chart-toggle.open .chevron { transform: rotate(180deg); }
  .chart-toggle.open { border-bottom-color: var(--border); }
  /* chart-wrap scrolls horizontally in expanded mode */
  .chart-wrap { display: none; flex-direction: column; overflow: hidden; }
  .chart-wrap.open { display: flex; height: 56px; }
  .chart-wrap.expanded { height: 40vh; }
  .chart-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; }
  .chart-scroll::-webkit-scrollbar { height: 4px; }
  .chart-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .chart-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #influence-chart { height: 100%; display: block; min-width: 100%; }

  /* ── Main layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar toggle strips ── */
  .sidebar-toggle {
    width: var(--toggle-w); flex-shrink: 0; background: var(--surface);
    border: 1px solid var(--border); cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 9px; transition: color 0.15s, background 0.15s;
    writing-mode: vertical-rl; letter-spacing: 0.15em; user-select: none;
  }
  .sidebar-toggle:hover { color: var(--text); background: var(--border); }

  /* ── Left sidebar ── */
  .sidebar-left {
    width: 240px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--surface); overflow-y: auto; padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
    transition: width 0.2s, padding 0.2s;
  }
  .sidebar-left.collapsed { width: 0; padding: 0; overflow: hidden; }
  .sidebar-toggle.left { border-left: none; border-right: 1px solid var(--border); order: -1; }

  /* ── Chat ── */
  .chat { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-bg); border: 1px solid var(--border); }
  .msg.persona { align-self: flex-start; background: var(--persona-bg); border: 1px solid var(--border); }
  .msg .role { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.08em; }
  .msg.user .role { color: var(--accent-dim); }
  .msg.persona .role { color: var(--muted); }
  .msg.thinking { opacity: 0.5; font-style: italic; }
  .input-row {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 13px;
    resize: none; height: 44px; line-height: 1.5; transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 0 18px; font-family: inherit; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Right sidebar ── */
  .sidebar {
    width: 300px; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--surface); overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    transition: width 0.2s, padding 0.2s;
  }
  .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; }
  .sidebar-toggle.right { border-right: none; border-left: 1px solid var(--border); }

  /* ── Panels ── */
  .panel { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .panel-head {
    background: var(--bg); padding: 6px 10px;
    font-size: 10px; letter-spacing: 0.1em; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .panel-head:hover { color: var(--text); }
  .panel-head .badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--border); color: var(--text);
  }
  .panel-head .pchev { font-size: 8px; color: var(--muted); margin-left: 6px; transition: transform 0.15s; }
  .panel-head.open .pchev { transform: rotate(180deg); }
  .panel-body { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .panel-body.scrollable { max-height: 200px; overflow-y: auto; }
  .panel-body.collapsed { display: none; }

  .bar-row { display: flex; flex-direction: column; gap: 3px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  .kv { display: flex; justify-content: space-between; font-size: 11px; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); text-align: right; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kv .v.green { color: var(--green); }
  .kv .v.yellow { color: var(--yellow); }
  .kv .v.red { color: var(--red); }
  .kv .v.blue { color: var(--blue); }
  .kv .v.muted { color: var(--muted); }

  .tag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin: 1px; background: var(--border); }

  .consolidation-banner {
    background: #2a1f00; border: 1px solid #6b4f00; border-radius: 6px;
    padding: 8px 10px; font-size: 11px; color: var(--yellow);
  }
  .consolidation-banner .head { font-weight: bold; margin-bottom: 4px; }

  .empty-state { color: var(--muted); font-size: 11px; text-align: center; padding: 20px 0; }

  /* ── Notes (left sidebar) ── */
  .notes-panel { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .notes-head {
    background: var(--bg); padding: 6px 10px; cursor: pointer; user-select: none;
    font-size: 10px; letter-spacing: 0.1em; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .notes-head:hover { color: var(--text); }
  .notes-head .chevron { transition: transform 0.2s; font-size: 9px; }
  .notes-head.open .chevron { transform: rotate(180deg); }
  .notes-body { display: none; padding: 8px; }
  .notes-body.open { display: flex; flex-direction: column; gap: 6px; }
  .notes-body textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px; border-radius: 4px; font-family: inherit; font-size: 11px;
    resize: vertical; min-height: 120px; line-height: 1.5;
  }
  .notes-body textarea:focus { outline: none; border-color: var(--accent); }
  .notes-save {
    align-self: flex-end; background: var(--accent); color: #fff; border: none;
    border-radius: 4px; padding: 3px 10px; font-family: inherit; font-size: 11px;
    cursor: pointer; transition: background 0.15s;
  }
  .notes-save:hover { background: var(--accent-dim); }
  .notes-saved { font-size: 10px; color: var(--green); align-self: flex-end; opacity: 0; transition: opacity 0.3s; }
  .notes-saved.show { opacity: 1; }

  .msg-header {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    margin-bottom: 8px; padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .msg-header .footer-left, .msg-header .footer-turn { font-size: 10px; color: var(--muted); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>PERSONA</h1>
  <div class="persona-selector">
    <label>PERSONA ID</label>
    <input id="personaId" type="text" value="default" placeholder="default">
  </div>
</header>

<div class="chart-row">
  <div class="chart-toggle" id="chart-toggle">
    <span>INFLUENCE</span>
    <span class="chevron">▲</span>
  </div>
  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-scroll" id="chart-scroll">
      <canvas id="influence-chart"></canvas>
    </div>
  </div>
</div>

<div class="layout">
  <!-- Left sidebar toggle -->
  <div class="sidebar-toggle left" id="left-toggle" title="Toggle context panels">INFO</div>

  <!-- Left sidebar -->
  <div class="sidebar-left collapsed" id="sidebar-left">
    <div class="notes-panel">
      <div class="notes-head" id="notes-head">
        NOTES <span class="chevron">▲</span>
      </div>
      <div class="notes-body open" id="notes-body">
        <textarea id="notes-text" placeholder="Notes about this persona…"></textarea>
        <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end">
          <span class="notes-saved" id="notes-saved">saved</span>
          <button class="notes-save" id="notes-save">Save</button>
        </div>
      </div>
    </div>
    <div id="left-panels">
      <div class="panel"><div class="panel-head">SESSION</div></div>
      <div class="panel"><div class="panel-head">NORMALIZATION</div></div>
      <div class="panel"><div class="panel-head">STORAGE</div></div>
      <div class="panel"><div class="panel-head">IMPORTANCE</div></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="empty-state">Start a conversation. The substrate is listening.</div>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <!-- Right sidebar toggle -->
  <div class="sidebar-toggle right" id="right-toggle" title="Toggle telemetry">TELEMETRY</div>

  <!-- Right sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="panel"><div class="panel-head">COHESION</div></div>
    <div class="panel"><div class="panel-head">CONTEXT</div></div>
    <div class="panel"><div class="panel-head">RETRIEVAL</div></div>
    <div class="panel"><div class="panel-head">INJECTED</div></div>
    <div class="panel"><div class="panel-head">MCP</div></div>
  </div>
</div>

<script>
const ws          = new WebSocket(`ws://${location.host}`)
const messagesEl  = document.getElementById('messages')
const inputEl     = document.getElementById('input')
const sendBtn     = document.getElementById('send')
const sidebarEl   = document.getElementById('sidebar')
const personaEl   = document.getElementById('personaId')

let thinking = null
let streamText = ''
let streamToolCalls = [] // [{name, done, result}]

function renderThinking() {
  if (!thinking) return
  const contentEl = thinking.querySelector('.stream-content')
  if (!contentEl) return
  const toolHtml = streamToolCalls.map(t => {
    const statusColor = t.done ? 'var(--green)' : 'var(--yellow)'
    const resultHtml = t.result != null
      ? `<div style="color:var(--muted);font-size:10px;margin-top:2px;white-space:pre-wrap;word-break:break-all">${escHtml(String(t.result).slice(0, 300))}${String(t.result).length > 300 ? '…' : ''}</div>`
      : ''
    return `<div style="margin:4px 0;padding:4px 6px;background:var(--bg);border-radius:4px;border-left:2px solid ${statusColor}">
      <span style="color:${statusColor};font-size:10px;font-weight:600">${escHtml(t.name)}</span>
      ${t.done ? '' : ' <span style="color:var(--yellow);font-size:9px;animation:pulse 1s infinite">running…</span>'}
      ${resultHtml}
    </div>`
  }).join('')
  const textHtml = streamText ? `<div style="margin-top:${streamToolCalls.length ? '6px' : '0'}">${escHtml(streamText)}</div>` : ''
  contentEl.innerHTML = toolHtml + textHtml || 'thinking…'
  messagesEl.scrollTop = messagesEl.scrollHeight
}

// ── Collapse state ──────────────────────────────────────────────────────────
const STORE = {
  get: k => { try { return JSON.parse(localStorage.getItem('persona-ui-' + k)) } catch { return null } },
  set: (k, v) => localStorage.setItem('persona-ui-' + k, JSON.stringify(v)),
}

// Chart — three states: 0=collapsed, 1=small (56px), 2=expanded (180px + h-scroll)
const chartToggleEl = document.getElementById('chart-toggle')
const chartCanvas   = document.getElementById('influence-chart')
const chartWrapEl   = document.getElementById('chart-wrap')
const chartScrollEl = document.getElementById('chart-scroll')

function applyChartState(state) {
  chartWrapEl.classList.toggle('open',     state >= 1)
  chartWrapEl.classList.toggle('expanded', state === 2)
  chartToggleEl.classList.toggle('open',   state >= 1)
  if (state >= 1) requestAnimationFrame(resizeChart)
}
chartToggleEl.addEventListener('click', () => {
  const cur = STORE.get('chart') ?? 1
  const next = (Number(cur) + 1) % 3
  STORE.set('chart', next)
  applyChartState(next)
})
applyChartState(STORE.get('chart') ?? 1) // default small

// Left sidebar
const leftToggle = document.getElementById('left-toggle')
const leftSidebar = document.getElementById('sidebar-left')
function applyLeftState(open) {
  leftSidebar.classList.toggle('collapsed', !open)
  leftToggle.style.color = open ? 'var(--accent)' : ''
}
leftToggle.addEventListener('click', () => {
  const next = leftSidebar.classList.contains('collapsed')
  STORE.set('left', next)
  applyLeftState(next)
})
applyLeftState(STORE.get('left') === true) // default collapsed

// Right sidebar
const rightToggle = document.getElementById('right-toggle')
function applyRightState(open) {
  sidebarEl.classList.toggle('collapsed', !open)
  rightToggle.style.color = open ? 'var(--accent)' : ''
}
rightToggle.addEventListener('click', () => {
  const next = sidebarEl.classList.contains('collapsed')
  STORE.set('right', next)
  applyRightState(next)
})
applyRightState(STORE.get('right') !== false) // default open

// Per-panel collapse state
const PANELS_COLLAPSED_DEFAULT = new Set(['STORAGE', 'NORMALIZATION'])
function isPanelOpen(name) {
  const stored = STORE.get('panel-' + name)
  if (stored !== null) return stored
  return !PANELS_COLLAPSED_DEFAULT.has(name)
}
function setPanelOpen(name, open) { STORE.set('panel-' + name, open) }

// ── History ─────────────────────────────────────────────────────────────────
async function loadHistory(personaId) {
  const r = await fetch(`/api/history/${encodeURIComponent(personaId)}?limit=40`)
  const turns = await r.json()
  if (!turns.length) return
  const empty = messagesEl.querySelector('.empty-state')
  if (empty) empty.remove()
  for (const t of turns) {
    const cls = t.role === 'user' ? 'user' : 'persona'
    const el = document.createElement('div')
    el.className = `msg ${cls}`
    let footer = ''
    if (t.role === 'assistant') {
      const d = new Date(t.timestamp)
      const ts = `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
      const sims = t.retrieval_cohesion_sims
        ? (Array.isArray(t.retrieval_cohesion_sims) ? t.retrieval_cohesion_sims : JSON.parse(t.retrieval_cohesion_sims))
        : []
      const rBar = buildRetrievalLabel(t.injected_memories ?? [], t.recalled_clusters ?? [])
      footer = `<span class="footer-left">PERSONA · ${ts}</span>${rBar}<span class="footer-turn">turn #${t.turn_number}</span>`
      pushChartPoint(sims, t.retrieval_factual_count ?? 0, t.timestamp)
    }
    el.innerHTML = `<div class="msg-header">${footer}</div>${escHtml(t.content)}`
    messagesEl.appendChild(el)
  }
  messagesEl.scrollTop = messagesEl.scrollHeight
}

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data)
  if (msg.type === 'init') {
    defaultPersonaId = msg.personaId
    personaEl.value = msg.personaId
    document.title = `PERSONA · ${msg.personaId}`
    loadNotes(msg.personaId)
    loadHistory(msg.personaId)
    return
  }

  if (msg.type === 'stream') {
    const ev = msg.event
    if (ev.type === 'text_delta') {
      streamText += ev.text
      renderThinking()
    } else if (ev.type === 'tool_use') {
      streamToolCalls.push({ name: ev.name, done: false, result: null })
      renderThinking()
    } else if (ev.type === 'tool_result') {
      const last = streamToolCalls[streamToolCalls.length - 1]
      if (last) { last.done = true; last.result = ev.result }
      renderThinking()
    }
    return
  }

  // Freeze tool call trace to prepend to the final response message
  let frozenTrace = ''
  if (streamToolCalls.length > 0) {
    frozenTrace = '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">' +
      streamToolCalls.map(t => {
        const resultHtml = t.result != null
          ? `<div style="color:var(--muted);font-size:10px;margin-top:2px;white-space:pre-wrap;word-break:break-all">${escHtml(String(t.result).slice(0, 300))}${String(t.result).length > 300 ? '…' : ''}</div>`
          : ''
        return `<div style="margin:2px 0;padding:4px 6px;background:var(--bg);border-radius:4px;border-left:2px solid var(--green)">
          <span style="color:var(--green);font-size:10px;font-weight:600">${escHtml(t.name)}</span>
          ${resultHtml}
        </div>`
      }).join('') +
    '</div>'
  }
  if (thinking) { thinking.remove(); thinking = null }
  streamText = ''
  streamToolCalls = []
  if (msg.type === 'response') {
    const r = msg.telemetry.retrieval
    pushChartPoint(r.cohesion.similarities, r.factual.count, Date.now())
    addMessage('PERSONA', frozenTrace + escHtml(msg.text), 'persona', msg.telemetry, true)
    renderSidebar(msg.telemetry, msg.importanceBanner)
  } else if (msg.type === 'dream_event') {
    // Live dream/goblin cycle update — refresh MIND STATE panel without a full sidebar render
    updateMindStatePanel(msg.event.mindState, msg.event.result)
    return
  } else if (msg.type === 'error') {
    addMessage('ERROR', msg.text, 'persona')
  }
  sendBtn.disabled = false
  inputEl.disabled = false
  inputEl.focus()
}
ws.onerror = () => addMessage('ERROR', 'WebSocket connection failed.', 'persona')

// ── Notes ────────────────────────────────────────────────────────────────────
const notesHead  = document.getElementById('notes-head')
const notesBody  = document.getElementById('notes-body')
const notesText  = document.getElementById('notes-text')
const notesSave  = document.getElementById('notes-save')
const notesSaved = document.getElementById('notes-saved')

notesHead.addEventListener('click', () => {
  const open = notesBody.classList.toggle('open')
  notesHead.classList.toggle('open', open)
})

async function loadNotes(personaId) {
  const r = await fetch(`/api/notes/${encodeURIComponent(personaId)}`)
  const d = await r.json()
  notesText.value = d.notes || ''
}
async function saveNotes() {
  const personaId = personaEl.value.trim() || defaultPersonaId
  await fetch(`/api/notes/${encodeURIComponent(personaId)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes: notesText.value }),
  })
  notesSaved.classList.add('show')
  setTimeout(() => notesSaved.classList.remove('show'), 1500)
}
notesSave.addEventListener('click', saveNotes)
notesText.addEventListener('keydown', e => { if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveNotes() } })

let defaultPersonaId = 'default'

// ── Chat ─────────────────────────────────────────────────────────────────────
function addMessage(role, text, cls, telemetry, rawHtml = false) {
  const empty = messagesEl.querySelector('.empty-state')
  if (empty) empty.remove()
  const el = document.createElement('div')
  el.className = `msg ${cls}`
  let footer = ''
  if (telemetry && cls === 'persona') {
    const _d = new Date()
    const ts = `${(_d.getMonth()+1).toString().padStart(2,'0')}/${_d.getDate().toString().padStart(2,'0')}/${_d.getFullYear()} ${_d.getHours().toString().padStart(2,'0')}:${_d.getMinutes().toString().padStart(2,'0')}`
    const r = telemetry.retrieval
    const rBar = buildRetrievalLabel(telemetry.injectedMemories ?? [], telemetry.recalledClusters ?? [])
    footer = `<span class="footer-left">PERSONA · ${ts}</span>${rBar}<span class="footer-turn">turn #${telemetry.turnNumber}</span>`
  }
  const body = rawHtml ? text : escHtml(text)
  el.innerHTML = `<div class="msg-header">${footer}</div>${body}`
  messagesEl.appendChild(el)
  messagesEl.scrollTop = messagesEl.scrollHeight
  return el
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function send() {
  const text = inputEl.value.trim()
  if (!text || sendBtn.disabled) return
  const personaId = personaEl.value.trim() || 'default'
  addMessage('YOU', text, 'user')
  inputEl.value = ''
  inputEl.style.height = '44px'
  sendBtn.disabled = true
  inputEl.disabled = true
  streamText = ''
  streamToolCalls = []
  thinking = addMessage('PERSONA', '<span class="stream-content">thinking…</span>', 'persona thinking', null, true)
  ws.send(JSON.stringify({ type: 'chat', text, personaId }))
}
sendBtn.onclick = send
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
})
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto'
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px'
})

function buildRetrievalLabel(injectedMemories, recalledClusters) {
  const injected = injectedMemories ?? []
  const recalled = recalledClusters ?? []
  const total = injected.length
  if (total === 0) {
    return `<span title="no memories injected" style="display:inline-flex;align-items:center;justify-content:center;width:100px">
      <span style="display:inline-flex;width:100px;height:5px;border-radius:3px;overflow:hidden;background:var(--border)"></span>
    </span>`
  }
  const cited = m => recalled.some(r => {
    const ml = m.cluster.toLowerCase(), rl = r.toLowerCase()
    return ml.includes(rl) || rl.includes(ml)
  })
  const citedCohesion = injected.filter(m => m.source === 'cohesion' && cited(m)).length
  const citedFactual  = injected.filter(m => m.source === 'factual'  && cited(m)).length
  const cohesionPct = Math.round((citedCohesion / total) * 100)
  const factualPct  = Math.round((citedFactual  / total) * 100)
  const label = recalled.length > 0
    ? `cited ${recalled.length}/${total} (${citedCohesion} cohesion, ${citedFactual} factual)`
    : `0/${total} memories cited`
  return `<span title="${label}" style="display:inline-flex;align-items:center;justify-content:center;width:100px">
    <span style="display:inline-flex;width:100px;height:5px;border-radius:3px;overflow:hidden;background:var(--border)">
      <span style="width:${cohesionPct}%;background:#4ade80"></span>
      <span style="width:${factualPct}%;background:#60a5fa"></span>
    </span>
  </span>`
}

// ── Influence chart ───────────────────────────────────────────────────────────
const chartCtx = chartCanvas.getContext('2d')
const chartHistory = []
const SIM_THRESHOLD = 0.80
const LABEL_H = 14

const MIN_PX_PER_POINT = 18 // px per data point in expanded mode

function resizeChart() {
  const expanded = chartWrapEl.classList.contains('expanded')
  const scrollW  = chartScrollEl.offsetWidth
  const naturalW = expanded ? Math.max(scrollW, chartHistory.length * MIN_PX_PER_POINT) : scrollW
  chartCanvas.style.width  = naturalW + 'px'
  chartCanvas.width        = naturalW * devicePixelRatio
  chartCanvas.height       = chartScrollEl.offsetHeight * devicePixelRatio
  drawChart()
  // In expanded mode, auto-scroll to the latest point
  if (expanded) chartScrollEl.scrollLeft = chartScrollEl.scrollWidth
}

function pushChartPoint(cohesionSims, factualCount, ts) {
  const c = cohesionSims && cohesionSims.length ? cohesionSims : []
  const aboveThreshold = c.filter(s => s >= SIM_THRESHOLD)
  const avgSim = aboveThreshold.length ? aboveThreshold.reduce((a, b) => a + b, 0) / aboveThreshold.length : 0
  const semantic = Math.round(avgSim * 100)
  const factual  = Math.min(100 - semantic, factualCount > 0 ? Math.min(factualCount * 10, 30) : 0)
  chartHistory.push({ semantic, factual, ts: ts || Date.now() })
  resizeChart()
}

function drawChart() {
  const w = chartCanvas.width
  const h = chartCanvas.height
  const dpr = devicePixelRatio
  const labelH = LABEL_H * dpr
  const plotH = h - labelH

  chartCtx.clearRect(0, 0, w, h)
  if (chartHistory.length < 2) return

  const n = chartHistory.length
  const xStep = w / (n - 1)
  function xOf(i) { return i * xStep }
  function yOf(pct) { return plotH - (pct / 100) * plotH }

  const semPts   = chartHistory.map((d, i) => ({ x: xOf(i), y: yOf(d.semantic) }))
  const stackPts = chartHistory.map((d, i) => ({ x: xOf(i), y: yOf(d.semantic + d.factual) }))

  chartCtx.beginPath()
  chartCtx.moveTo(semPts[0].x, plotH)
  for (const p of semPts) chartCtx.lineTo(p.x, p.y)
  chartCtx.lineTo(semPts[n-1].x, plotH)
  chartCtx.closePath()
  chartCtx.fillStyle = 'rgba(74,222,128,0.35)'
  chartCtx.fill()

  chartCtx.beginPath()
  chartCtx.moveTo(stackPts[0].x, semPts[0].y)
  for (let i = 0; i < n; i++) chartCtx.lineTo(stackPts[i].x, stackPts[i].y)
  for (let i = n-1; i >= 0; i--) chartCtx.lineTo(semPts[i].x, semPts[i].y)
  chartCtx.closePath()
  chartCtx.fillStyle = 'rgba(96,165,250,0.4)'
  chartCtx.fill()

  chartCtx.beginPath()
  chartCtx.moveTo(semPts[0].x, semPts[0].y)
  for (const p of semPts) chartCtx.lineTo(p.x, p.y)
  chartCtx.strokeStyle = '#4ade80'
  chartCtx.lineWidth = 1.5 * dpr
  chartCtx.stroke()

  chartCtx.beginPath()
  chartCtx.moveTo(stackPts[0].x, stackPts[0].y)
  for (const p of stackPts) chartCtx.lineTo(p.x, p.y)
  chartCtx.strokeStyle = '#60a5fa'
  chartCtx.lineWidth = 1 * dpr
  chartCtx.stroke()

  const fontSize = 9 * dpr
  chartCtx.font = `${fontSize}px 'SF Mono', 'Fira Code', monospace`
  chartCtx.fillStyle = 'rgba(107,112,128,0.8)'
  chartCtx.textBaseline = 'bottom'
  const maxLabels = Math.max(2, Math.floor(w / (52 * dpr)))
  const step = Math.max(1, Math.floor((n - 1) / (maxLabels - 1)))
  const indices = []
  for (let i = 0; i < n; i += step) indices.push(i)
  if (indices[indices.length - 1] !== n - 1) indices.push(n - 1)
  for (const i of indices) {
    const d = new Date(chartHistory[i].ts)
    const label = `${(d.getHours()).toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
    const x = xOf(i)
    chartCtx.textAlign = i === 0 ? 'left' : i === n - 1 ? 'right' : 'center'
    chartCtx.fillText(label, x, h)
  }
}

window.addEventListener('resize', resizeChart)
requestAnimationFrame(resizeChart)

// ── Mind state panel ─────────────────────────────────────────────────────────
const STATE_COLORS = {
  dream:        'var(--accent)',
  conversation: 'var(--blue)',
  goblin:       'var(--yellow)',
  refractory:   'var(--red)',
}

function renderMindState(ms, lastCycle) {
  if (!ms) return ''
  const stateColor = STATE_COLORS[ms.state] || 'var(--muted)'

  const traj = ms.cohesionTrajectory || []
  const trajHtml = traj.length
    ? traj.map((s, i) => {
        const col = s >= 8 ? '#4ade80' : s >= 5 ? '#7c6af7' : '#f87171'
        const bold = i === traj.length - 1 ? 'font-weight:bold' : ''
        return `<span style="color:${col};${bold}">${s}</span>`
      }).join('<span style="color:var(--border)"> › </span>')
    : '<span style="color:var(--muted)">—</span>'

  const goblinsHtml = ms.activeGoblins && ms.activeGoblins.length
    ? ms.activeGoblins.map(g =>
        `<div style="font-size:10px;padding:3px 0;border-top:1px solid var(--border);color:var(--yellow)">
           &#x1F47A; ${escHtml(g.trigger.slice(0, 100))}${g.trigger.length > 100 ? '…' : ''}
         </div>`
      ).join('')
    : '<div style="font-size:10px;color:var(--muted)">none</div>'

  const budgetUsed = ms.ideaBudget?.used || 0
  const budgetLimit = ms.ideaBudget?.limit || 100000
  const budgetPct = (budgetUsed / budgetLimit * 100)
  const budgetColor = budgetPct > 80 ? '#f87171' : budgetPct > 50 ? '#facc15' : '#7c6af7'

  const events = (ms.recentEvents || []).slice(-10).reverse()
  const eventsHtml = events.length
    ? events.map(ev => {
        const t = new Date(ev.timestamp)
        const ts = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`
        let label = ev.type
        let color = 'var(--muted)'
        if (ev.type === 'state_transition')  { label = `${ev.from} → ${ev.to}`; color = STATE_COLORS[ev.to] || 'var(--muted)' }
        if (ev.type === 'goblin_fired')      { label = `goblin: ${ev.trigger.slice(0, 60)}`; color = 'var(--yellow)' }
        if (ev.type === 'goblin_resolved')   { label = 'goblin resolved'; color = 'var(--green)' }
        if (ev.type === 'goblin_faded')      { label = 'goblin faded'; color = 'var(--muted)' }
        if (ev.type === 'cohesion_drop')     { label = `drop ${ev.previous?.toFixed(1)} → ${ev.current} (Δ${ev.delta?.toFixed(1)})`; color = 'var(--red)' }
        if (ev.type === 'budget_tick')       { label = `budget ${ev.used}/${budgetLimit}`; color = 'var(--muted)' }
        if (ev.type === 'budget_exhausted')  { label = 'budget exhausted'; color = 'var(--red)' }
        if (ev.type === 'budget_reset')      { label = 'budget reset'; color = 'var(--green)' }
        if (ev.type === 'session_interrupted') { label = 'session interrupted'; color = 'var(--red)' }
        return `<div style="font-size:10px;display:flex;gap:6px;padding:2px 0;border-top:1px solid var(--border)">
          <span style="color:var(--muted);flex-shrink:0">${ts}</span>
          <span style="color:${color}">${escHtml(label)}</span>
        </div>`
      }).join('')
    : '<div style="font-size:10px;color:var(--muted)">no events yet</div>'

  const body = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="color:${stateColor};font-size:13px;font-weight:600;letter-spacing:0.12em">${ms.state.toUpperCase()}</span>
      <span style="color:var(--muted);font-size:10px">eq ${ms.equilibrium?.toFixed(1) ?? '—'}/10</span>
    </div>
    <div class="bar-row" style="margin-bottom:8px">
      <div class="bar-label"><span>equilibrium</span><span style="color:${stateColor}">${ms.equilibrium?.toFixed(1) ?? '—'}</span></div>
      ${bar(ms.equilibrium || 0, 10, stateColor)}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:3px">trajectory</div>
    <div style="margin-bottom:8px;font-size:11px;line-height:1.8">${trajHtml}</div>
    <div class="bar-row" style="margin-bottom:8px">
      <div class="bar-label"><span>idea budget</span><span>${budgetUsed.toLocaleString()} / ${budgetLimit.toLocaleString()}</span></div>
      ${bar(budgetUsed, budgetLimit, budgetColor)}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:3px">active goblins</div>
    <div style="margin-bottom:8px">${goblinsHtml}</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:3px">events</div>
    ${eventsHtml}
    ${lastCycle ? `
    <div style="font-size:10px;color:var(--muted);margin-top:8px;margin-bottom:3px">${lastCycle.type === 'goblin' ? 'goblin poke' : 'dream thought'}</div>
    <div style="font-size:10px;color:${lastCycle.type === 'goblin' ? 'var(--yellow)' : 'var(--fg)'};line-height:1.5;padding:4px 0;border-top:1px solid var(--border)">
      ${escHtml(lastCycle.thought.slice(0, 200))}${lastCycle.thought.length > 200 ? '…' : ''}
      <span style="color:var(--muted)"> (${lastCycle.coherence}/10)</span>
      ${lastCycle.resolved === true ? '<span style="color:var(--green)"> ✓ resolved</span>' : ''}
    </div>` : ''}
  `
  return panel('MIND STATE', `<span class="badge" style="background:transparent;color:${stateColor}">${ms.state}</span>`, body)
}

// Live update of the MIND STATE panel from a dream_event without full sidebar re-render.
// Finds the existing panel in the right sidebar and replaces just its content.
let lastDreamThought = null
function updateMindStatePanel(ms, cycleResult) {
  if (!ms) return
  lastDreamThought = cycleResult
  const sidebar = document.getElementById('sidebar')
  if (!sidebar) return
  const newPanelHtml = renderMindState(ms, cycleResult)
  const tmp = document.createElement('div')
  tmp.innerHTML = newPanelHtml
  const newPanel = tmp.firstElementChild
  if (!newPanel) return
  // Find existing MIND STATE panel
  const existing = [...sidebar.querySelectorAll('.panel')].find(p => {
    const head = p.querySelector('.panel-head')
    return head && head.textContent.trim().startsWith('MIND STATE')
  })
  if (existing) {
    existing.replaceWith(newPanel)
  } else {
    // Panel doesn't exist yet — insert after COHESION placeholder or at top
    const cohesion = [...sidebar.querySelectorAll('.panel')].find(p => {
      const head = p.querySelector('.panel-head')
      return head && head.textContent.trim().startsWith('COHESION')
    })
    if (cohesion) cohesion.after(newPanel)
    else sidebar.prepend(newPanel)
  }
}

// ── Sidebar renderer ──────────────────────────────────────────────────────────
function bar(value, max, color = '#7c6af7') {
  const pct = Math.min(100, (value / max) * 100).toFixed(1)
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`
}
function kv(k, v, cls = '') {
  return `<div class="kv"><span class="k">${k}</span><span class="v ${cls}">${escHtml(String(v))}</span></div>`
}
function cohesionColor(score) {
  if (score >= 8) return '#4ade80'
  if (score >= 5) return '#7c6af7'
  return '#f87171'
}

function panel(name, badgeHtml, bodyHtml, headStyle = '', scrollable = false) {
  const open = isPanelOpen(name)
  const id = 'panel-' + name.replace(/\s+/g, '-').toLowerCase()
  const bodyClass = ['panel-body', open ? '' : 'collapsed', scrollable ? 'scrollable' : ''].filter(Boolean).join(' ')
  return `<div class="panel">
    <div class="panel-head ${open ? 'open' : ''}" ${headStyle} onclick="togglePanel('${name}','${id}',this)">
      ${name}${badgeHtml ? ' ' + badgeHtml : ''}<span class="pchev">▲</span>
    </div>
    <div class="${bodyClass}" id="${id}">${bodyHtml}</div>
  </div>`
}

function togglePanel(name, id, headEl) {
  const body = document.getElementById(id)
  const open = body.classList.toggle('collapsed')
  headEl.classList.toggle('open', !open)
  setPanelOpen(name, !open)
}

function renderSidebar(t, importanceBanner) {
  const empty = document.getElementById('sidebar-empty')
  if (empty) empty.remove()

  let left = ''
  let html = ''

  // ── LEFT: SESSION
  left += panel('SESSION', `<span class="badge">turn ${t.turnNumber}</span>`,
    kv('persona', t.personaId, 'blue'))

  // ── RIGHT: COHESION
  const c = t.cohesion
  const cScore = c ? c.score : 0
  const cColor = cohesionColor(cScore)
  const cohesionBody = c ? `
    <div class="bar-row">
      <div class="bar-label"><span>coherence</span><span style="color:${cColor}">${cScore}/10</span></div>
      ${bar(cScore, 10, cColor)}
    </div>
    ${kv('drivers', c.drivers || '—')}
    ${kv('shifts', c.shifts || '—')}
    ${t.cohesionHealth.recovered ? kv('note', 'recovered via re-prompt', 'yellow') : ''}
    ${(() => { const h = t.cohesionHealth; const pct = (h.coveragePct * 100).toFixed(0); const col = h.coveragePct >= 0.95 ? 'green' : h.coveragePct >= 0.8 ? 'yellow' : 'red'; return kv('coverage', `${pct}% · ${h.ratedTurns} rated / ${h.unratedTurns} unrated`, col) })()}
  ` : kv('status', '⚠ no rating — plain LLM this turn', 'red')
  html += panel('COHESION', `<span class="badge">${c ? cScore + '/10' : 'n/a'}</span>`, cohesionBody)

  // MIND STATE
  html += renderMindState(t.mindState, lastDreamThought)

  // CONTEXT
  const ctxPct = (t.contextPct * 100).toFixed(1)
  const ctxColor = t.contextPct > 0.2 ? '#facc15' : '#7c6af7'
  const ctxBody = `
    <div class="bar-row">
      <div class="bar-label"><span>${t.contextTokens.toLocaleString()} tokens</span><span>${t.contextBudget.toLocaleString()} budget</span></div>
      ${bar(t.contextTokens, t.contextBudget, ctxColor)}
    </div>
    ${kv('capture', 'every response → weighted memory')}
    ${kv('eviction', 'FIFO over budget (lossless)')}
  `
  html += panel('CONTEXT', `<span class="badge">${ctxPct}%</span>`, ctxBody)

  // RETRIEVAL
  const cohSims = t.retrieval.cohesion.similarities.map(s => s.toFixed(3)).join(', ') || '—'
  const factHits = t.retrieval.factual.keywordHits.join(', ') || '—'
  const retBody = `
    ${kv('cohesion memories', t.retrieval.cohesion.count, t.retrieval.cohesion.count > 0 ? 'green' : '')}
    ${t.retrieval.cohesion.count > 0 ? kv('similarities', cohSims) : ''}
    ${kv('factual memories', t.retrieval.factual.count, t.retrieval.factual.count > 0 ? 'green' : '')}
    ${t.retrieval.factual.count > 0 ? kv('keyword hits', factHits) : ''}
  `
  html += panel('RETRIEVAL', '', retBody, '', true)

  // INJECTED
  if (t.injectedMemories && t.injectedMemories.length > 0) {
    const memRows = t.injectedMemories.map(m => {
      const sim = m.similarity != null ? ` <span style="color:var(--muted)">${m.similarity.toFixed(3)}</span>` : ''
      const color = m.source === 'cohesion' ? 'green' : 'blue'
      return `<div style="font-size:10px;border-top:1px solid var(--border);padding:4px 0">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="color:var(--${color})">${escHtml(m.cluster)}</span>${sim}
        </div>
        <div style="color:var(--muted);line-height:1.4">${escHtml(m.summary.slice(0, 140))}${m.summary.length > 140 ? '…' : ''}</div>
      </div>`
    }).join('')
    html += panel('INJECTED', `<span class="badge">${t.injectedMemories.length}</span>`, memRows, '', true)
  } else {
    html += panel('INJECTED', '', kv('memories', 'none — cold LLM', 'red'))
  }

  // MCP
  if (t.mcpToolCalls && t.mcpToolCalls.length > 0) {
    const callRows = t.mcpToolCalls.map(c => {
      const inputStr = JSON.stringify(c.input, null, 2)
      const resultStr = c.result != null
        ? (typeof c.result === 'string' ? c.result : JSON.stringify(c.result, null, 2))
        : '—'
      return `<div style="font-size:10px;border-top:1px solid var(--border);padding:4px 0">
        <div style="color:var(--green);font-weight:600;margin-bottom:3px">${escHtml(c.name)}</div>
        <div style="color:var(--muted);white-space:pre-wrap;word-break:break-all;margin-bottom:3px">${escHtml(inputStr)}</div>
        <div style="color:var(--fg);white-space:pre-wrap;word-break:break-all">${escHtml(resultStr.slice(0, 600))}${resultStr.length > 600 ? '…' : ''}</div>
      </div>`
    }).join('')
    html += panel('MCP', `<span class="badge">${t.mcpToolCalls.length}</span>`, callRows, 'style="color:var(--green)"', true)
  }

  // ── LEFT: NORMALIZATION
  const normBody = `
    ${kv('contradictions', t.normalization.contradictions, t.normalization.contradictions > 0 ? 'red' : '')}
    ${kv('additions', t.normalization.additions, t.normalization.additions > 0 ? 'yellow' : '')}
    ${t.normalization.candidateLength !== t.normalization.normalizedLength
      ? kv('length delta', `${t.normalization.candidateLength} → ${t.normalization.normalizedLength} chars`)
      : ''}
  `
  left += panel('NORMALIZATION', '', normBody)

  // ── LEFT: STORAGE
  const storeBody = `
    ${kv('user turn', t.storage.userTurnId.slice(-8) + '…', 'muted')}
    ${kv('asst turn', t.storage.assistantTurnId.slice(-8) + '…', 'muted')}
    ${kv('archive', t.storage.archivePath)}
  `
  left += panel('STORAGE', '', storeBody)

  // ── LEFT: IMPORTANCE
  if (importanceBanner) {
    left += panel('IMPORTANCE', '',
      `<div style="font-size:11px;color:var(--muted)">${escHtml(importanceBanner)}</div>`)
  }

  // CONSOLIDATION
  if (t.consolidation.triggered) {
    const clusters = t.consolidation.summarized.map(c =>
      `<div class="kv"><span class="k">${escHtml(c.cluster)}</span><span class="v">${c.turnCount} turns · peak ${c.cohesionPeak} · ${c.tier}</span></div>`
    ).join('')
    html += `<div class="consolidation-banner">
      <div class="head">⚡ CAPTURE</div>
      ${kv('buffer before', t.consolidation.bufferTokensBefore.toLocaleString() + ' tokens')}
      ${kv('captured', t.consolidation.summarized.length + ' memory')}
      ${clusters}
      ${kv('hot buffer', t.consolidation.preserved + ' turns')}
      ${kv('evicted', t.consolidation.dropped + ' turns (FIFO)')}
      ${kv('buffer after', t.consolidation.bufferTokensAfter.toLocaleString() + ' tokens')}
    </div>`
  }

  sidebarEl.innerHTML = html
  const leftPanels = document.getElementById('left-panels')
  if (leftPanels) leftPanels.innerHTML = left
}
</script>
